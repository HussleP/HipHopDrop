name: Scrape Drops

# Runs automatically twice a week.
# Also runs manually from the GitHub Actions tab (workflow_dispatch).
#
# SCHEDULE:
#   Thursday 3:00pm UTC = 11:00am ET  →  catches Supreme Thursday drops
#   Monday   2:00pm UTC = 10:00am ET  →  catches Golf Wang / NOCTA / skate brand new arrivals

on:
  schedule:
    - cron: '0 15 * * 4'   # Thursday 3pm UTC
    - cron: '0 14 * * 1'   # Monday   2pm UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install firebase-admin
        run: npm install firebase-admin --no-save

      - name: Run scraper
        run: node scripts/scrapeDrops.mjs
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Log result
        if: always()
        run: echo "Scraper finished at $(date -u)"
